<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Family</title>

    <style>

        body {
            background: linear-gradient(to bottom, #1b4332, #2d6a4f, #d4af37);
            font-family: Arial, sans-serif;
            margin: 20px;
            color: #f8f9fa;
        }

        header {
            background-color: #081c15;
            color: #d4af37;
            text-align: center;
            padding: 30px;
            border-radius: 12px;
            border-bottom: 8px solid #d4af37;
        }

        header h1 {
            margin: 0;
            font-size: 42px;
        }

        section {
            max-width: 1000px;
            margin: 40px auto;
            background-color: rgba(255, 255, 255, 0.95);
            padding: 25px;
            border-radius: 12px;
            box-shadow: 4px 4px 16px rgba(0, 0, 0, 0.4);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
            color: #222222;
        }

        th {
            background-color: #1b4332;
            color: #d4af37;
            padding: 15px;
            text-align: left;
            font-size: 18px;
        }

        td {
            padding: 14px;
            border-bottom: 1px solid #cccccc;
        }

        tr:nth-child(even) {
            background-color: #f3f3f3;
        }

        tr:hover {
            background-color: #d8f3dc;
        }

        footer {
            background-color: #081c15;
            color: #d4af37;
            text-align: center;
            padding: 15px;
            border-radius: 12px;
            margin-top: 30px;
            border-top: 6px solid #d4af37;
        }

    </style>
</head>

<body>

    <header>
        <h1>My Family</h1>
        <h1>The Knights of the Round Table</h1>
    </header>

    <section>

        <table>

            <tr>
                <th>First Name</th>
                <th>Last Name</th>
                <th>Age</th>
                <th>Favorite Color</th>
            </tr>

            <tr>
                <td>Arthur</td>
                <td>Pendragon</td>
                <td>45</td>
                <td>Gold</td>
            </tr>

            <tr>
                <td>Lancelot</td>
                <td>Du Lac</td>
                <td>38</td>
                <td>Silver</td>
            </tr>

            <tr>
                <td>Gawain</td>
                <td>Orkney</td>
                <td>34</td>
                <td>Green</td>
            </tr>

            <tr>
                <td>Percival</td>
                <td>Grail</td>
                <td>29</td>
                <td>White</td>
            </tr>

            <tr>
                <td>Galahad</td>
                <td>Pureheart</td>
                <td>24</td>
                <td>Blue</td>
            </tr>

            <tr>
                <td>Tristan</td>
                <td>Lyonesse</td>
                <td>31</td>
                <td>Red</td>
            </tr>

            <tr>
                <td>Merlin</td>
                <td>Emrys</td>
                <td>70</td>
                <td>Purple</td>
            </tr>

        </table>

    </section>

    <footer>
        <p>&copy; Lee DeVault 2026</p>
    </footer>

</body>
</html>
