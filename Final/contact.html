<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cyber Trail - Contact</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <h1>Contact</h1>
</header>

<nav>
    <a href="index.html">Home</a>
    <a href="blog.html">Blog</a>
    <a href="contact.html">Contact</a>
</nav>

<main>
    <img class="page-img" src="images/meme3.png" alt="Contact page meme">

    <h2>Contact Me</h2>

    <p>
        Use the form below to send a message. This form uses the GET method and
        sends the user to the thank-you page after submission.
    </p>

    <form method="GET" action="thank-you.html">
        <label for="name">Name</label>
        <input type="text" id="name" name="name" required>

        <label for="email">Email Address</label>
        <input type="email" id="email" name="email" required>

        <label for="message">Message</label>
        <textarea id="message" name="message" required></textarea>

        <button type="submit">Send Message</button>
    </form>
</main>

<footer>
    <p>&copy; 2026 Lee DeVault</p>
</footer>

</body>
</html>
